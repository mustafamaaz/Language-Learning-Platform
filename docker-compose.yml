services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-platform-postgres
    environment:
      POSTGRES_USER: learning_user
      POSTGRES_PASSWORD: learning_password
      POSTGRES_DB: learning_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_user -d learning_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
